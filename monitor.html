<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBMS Monitor — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #13151f;
  --surface2: #1a1d27;
  --border: #22263a;
  --accent: #4f8ef7;
  --accent2: #38d9a9;
  --warn: #f59e0b;
  --danger: #f87171;
  --text: #e8eaf0;
  --muted: #6b7280;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

.grid-bg{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(79,142,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.04) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none}

.layout{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase}
.logo-sub{font-size:12px;color:var(--muted);margin-top:2px}

.stats-col{display:flex;flex-direction:column;gap:8px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:600;color:var(--text)}
.stat-val.green{color:var(--accent2)}
.stat-val.blue{color:var(--accent)}
.stat-val.warn{color:var(--warn)}

.session-controls{display:flex;flex-direction:column;gap:8px;margin-top:auto}
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity 0.2s,transform 0.1s}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:0.9}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
.btn:disabled{opacity:0.4;cursor:not-allowed}

.timer-display{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--accent);text-align:center;padding:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}

/* MAIN */
.main{padding:1.5rem;overflow-y:auto}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.main-title{font-size:18px;font-weight:600}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(56,217,169,0.1);border:1px solid var(--accent2);color:var(--accent2);border-radius:6px;padding:4px 10px;font-family:var(--mono);font-size:12px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 1.5s infinite}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

.team-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color 0.3s}
.team-card.all-done{border-color:var(--accent2)}
.team-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.team-name{font-size:15px;font-weight:500}
.topic-chip{font-size:10px;padding:3px 8px;border-radius:5px;background:rgba(79,142,247,0.15);color:var(--accent);font-family:var(--mono);max-width:140px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}

.members-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.member-row{display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background 0.5s}
.status-dot.online{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.5)}
.status-dot.idle{background:var(--warn)}
.status-dot.offline{background:#374151}
.member-name-text{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-meta{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.member-meta .done{color:var(--accent2)}

.prog-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:10px}
.prog-fill{height:100%;border-radius:2px;background:var(--accent2);transition:width 0.6s}

.card-footer{display:flex;align-items:center;justify-content:space-between}
.footer-tag{font-size:11px;font-family:var(--mono);color:var(--muted)}
.footer-tag.done{color:var(--accent2)}
.mcq-pill{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(79,142,247,0.1);color:var(--accent);font-family:var(--mono)}

/* Setup panel */
.setup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.setup-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.setup-title{font-size:18px;font-weight:500;margin-bottom:1.5rem}
.field{margin-bottom:14px}
.field label{font-size:13px;color:var(--muted);font-family:var(--mono);display:block;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:200px;font-size:13px;line-height:1.6}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.hidden{display:none!important}

/* Submission viewer */
.sub-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.sub-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.sub-title{font-size:16px;font-weight:500;margin-bottom:8px}
.sub-meta{font-size:12px;color:var(--muted);margin-bottom:1rem;font-family:var(--mono)}
.sub-text{font-size:14px;line-height:1.8;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px}
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <div class="logo">DBMS Monitor</div>
      <div class="logo-sub">Teacher dashboard</div>
    </div>

    <div class="timer-display" id="timer-el">00:00</div>

    <div class="stats-col">
      <div class="stat-card"><div class="stat-label">Total teams</div><div class="stat-val blue" id="s-teams">—</div></div>
      <div class="stat-card"><div class="stat-label">Online now</div><div class="stat-val green" id="s-online">—</div></div>
      <div class="stat-card"><div class="stat-label">Summaries in</div><div class="stat-val" id="s-summaries">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg MCQ score</div><div class="stat-val warn" id="s-mcq">—</div></div>
    </div>

    <div class="session-controls">
      <button class="btn btn-outline" onclick="showSetup()">Setup / Load teams</button>
      <button class="btn btn-primary" onclick="startSession()" id="start-btn">Start session</button>
      <button class="btn btn-danger hidden" onclick="endSession()" id="end-btn">End session</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <div class="main-title">Live class monitor</div>
      <div id="live-badge" class="live-badge hidden"><div class="live-dot"></div>LIVE</div>
    </div>

    <div id="no-session" style="text-align:center;padding:4rem;color:var(--muted)">
      <div style="font-family:var(--mono);font-size:13px;margin-bottom:8px">No session active</div>
      <div style="font-size:13px">Use Setup to load teams, then Start Session</div>
    </div>

    <div id="teams-grid" class="teams-grid hidden"></div>
  </div>
</div>

<!-- SETUP OVERLAY -->
<div class="setup-overlay hidden" id="setup-overlay">
  <div class="setup-box">
    <div class="setup-title">Setup — Teams & Topics</div>
    <div class="two-col">
      <div class="field">
        <label>Student names (one per line)</label>
        <textarea id="names-input" placeholder="Ahmed Khan&#10;Sara Malik&#10;..."></textarea>
      </div>
      <div>
        <div class="field">
          <label>Team size</label>
          <select id="team-size-sel">
            <option value="2">2 per team</option>
            <option value="3" selected>3 per team</option>
            <option value="4">4 per team</option>
          </select>
        </div>
        <div class="field">
          <label>Topics (one per line)</label>
          <textarea id="topics-input" rows="12">Introduction to Database Systems
Issues in Traditional File Storage Systems
Advantages of DBMS
Evolution of DBMS
SDLC Approach for DBMS
Rapid Prototyping for DBMS
ANSI SPARC Model and Data Independence
Schema and Schema Modelling
Introduction to ER Modelling
Constructs of ER
Attributes and Their Types
Entity and Entity Types
Relationships
Associative Entities
Degree of Relationships
Cardinalities in Relationships
Enhanced ER with Supertype Subtype Modelling
Completeness, Dis-jointness, Subtype Discriminators
Relational Keys
Relational Integrity
Relational Model
Transforming ER to Relational Model</textarea>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:1rem">
      <button class="btn btn-primary" onclick="generateTeams()">Generate teams randomly</button>
      <button class="btn btn-outline" onclick="closeSetup()">Cancel</button>
    </div>
  </div>
</div>

<!-- SUBMISSION VIEWER -->
<div class="sub-overlay hidden" id="sub-overlay">
  <div class="sub-box">
    <div class="sub-title" id="sub-name">—</div>
    <div class="sub-meta" id="sub-meta">—</div>
    <div class="sub-text" id="sub-text">—</div>
    <div style="margin-top:1rem">
      <button class="btn btn-outline" onclick="closeSubView()">Close</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── PASTE YOUR FIREBASE CONFIG BELOW ──
const firebaseConfig = {
  apiKey: "AIzaSyBgYtUIOeWntYEgEcAH93PBHGjEfrrZdTg",
  authDomain: "so-online-classes.firebaseapp.com",
  projectId: "so-online-classes",
  storageBucket: "so-online-classes.firebasestorage.app",
  messagingSenderId: "763914223805",
  appId: "1:763914223805:web:24c5492eb64390331cb7d4"
};
// ─────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let teams = [];
let presenceData = {};
let sessionActive = false;
let sessionStart = null;
let timerInterval = null;

const OFFLINE_MS = 15 * 60 * 1000;
const IDLE_MS = 5 * 60 * 1000;

function getStatus(lastSeen) {
  if (!lastSeen) return 'offline';
  const ago = Date.now() - lastSeen;
  if (ago > OFFLINE_MS) return 'offline';
  if (ago > IDLE_MS) return 'idle';
  return 'online';
}

// Load existing session on page load
async function init() {
  const snap = await getDoc(doc(db, 'session', 'config'));
  if (snap.exists()) {
    const data = snap.data();
    teams = data.teams || [];
    if (data.active) {
      sessionActive = true;
      sessionStart = data.startTime;
      document.getElementById('start-btn').disabled = true;
      document.getElementById('end-btn').classList.remove('hidden');
      document.getElementById('live-badge').classList.remove('hidden');
      document.getElementById('no-session').classList.add('hidden');
      document.getElementById('teams-grid').classList.remove('hidden');
      startTimer();
    }
    if (teams.length > 0) renderTeams();
  }
  listenPresence();
}

function listenPresence() {
  onSnapshot(collection(db, 'presence'), (snap) => {
    snap.forEach(doc => { presenceData[doc.data().name] = doc.data(); });
    if (teams.length > 0) renderTeams();
    updateStats();
  });
}

window.showSetup = function() {
  document.getElementById('setup-overlay').classList.remove('hidden');
}
window.closeSetup = function() {
  document.getElementById('setup-overlay').classList.add('hidden');
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

window.generateTeams = async function() {
  const names = document.getElementById('names-input').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
  const topics = document.getElementById('topics-input').value.trim().split('\n').map(s=>s.trim()).filter(Boolean);
  const size = parseInt(document.getElementById('team-size-sel').value);
  if (names.length < 2) { alert('Add student names'); return; }
  const shuffled = shuffle(names);
  teams = [];
  let tIdx = 0;
  for(let i=0;i<shuffled.length;i+=size){
    teams.push({
      name: `Team ${tIdx+1}`,
      topic: topics[tIdx % topics.length],
      members: shuffled.slice(i,i+size)
    });
    tIdx++;
  }
  await setDoc(doc(db, 'session', 'config'), { teams, active: false, startTime: null });
  renderTeams();
  updateStats();
  document.getElementById('no-session').classList.add('hidden');
  document.getElementById('teams-grid').classList.remove('hidden');
  closeSetup();
}

window.startSession = async function() {
  if(teams.length===0){alert('Set up teams first');return;}
  sessionStart = Date.now();
  sessionActive = true;
  await setDoc(doc(db, 'session', 'config'), { teams, active: true, startTime: sessionStart }, { merge: true });
  document.getElementById('start-btn').disabled = true;
  document.getElementById('end-btn').classList.remove('hidden');
  document.getElementById('live-badge').classList.remove('hidden');
  startTimer();
}

window.endSession = async function() {
  if(!confirm('End the session?')) return;
  sessionActive = false;
  await setDoc(doc(db,'session','config'),{active:false},{merge:true});
  clearInterval(timerInterval);
  document.getElementById('start-btn').disabled = false;
  document.getElementById('end-btn').classList.add('hidden');
  document.getElementById('live-badge').classList.add('hidden');
}

function startTimer() {
  timerInterval = setInterval(() => {
    if(!sessionStart) return;
    const elapsed = Math.floor((Date.now()-sessionStart)/1000);
    const left = Math.max(0, 40*60 - elapsed);
    const m = Math.floor(left/60);
    const s = left%60;
    document.getElementById('timer-el').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if(left===0){clearInterval(timerInterval);document.getElementById('timer-el').style.color='var(--danger)';}
  }, 1000);
}

function renderTeams() {
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';
  teams.forEach(team => {
    const members = team.members.map(name => {
      const p = presenceData[name];
      const status = p ? getStatus(p.lastSeen) : 'offline';
      const mcqAns = p ? (p.mcqAnswered || 0) : 0;
      const mcqScore = p ? (p.mcqScore || 0) : 0;
      const summary = p ? (p.summarySubmitted || false) : false;
      return { name, status, mcqAns, mcqScore, summary };
    });

    const online = members.filter(m=>m.status==='online').length;
    const totalMcq = members.reduce((a,m)=>a+m.mcqScore,0);
    const anySummary = members.some(m=>m.summary);
    const allDone = members.every(m=>m.summary && m.mcqAns>=5);
    const progress = Math.round((members.filter(m=>m.status!=='offline').length/members.length)*50 + (allDone?50:anySummary?25:0));

    const card = document.createElement('div');
    card.className = `team-card${allDone?' all-done':''}`;
    card.innerHTML = `
      <div class="team-top">
        <div class="team-name">${team.name}</div>
        <div class="topic-chip" title="${team.topic}">${team.topic}</div>
      </div>
      <div class="members-list">
        ${members.map(m=>`
          <div class="member-row">
            <div class="status-dot ${m.status}"></div>
            <span class="member-name-text">${m.name}</span>
            <span class="member-meta">
              <span class="${m.summary?'done':''}">${m.mcqAns}/5 MCQ</span>
              ${m.summary?'<span class="done"> ✓</span>':''}
              ${m.summary?`<span style="cursor:pointer;color:var(--accent);margin-left:4px" onclick="viewSummary('${m.name.replace(/'/g,"\\'")}')"> view</span>`:''}
            </span>
          </div>`).join('')}
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${progress}%"></div></div>
      <div class="card-footer">
        <span class="footer-tag ${allDone?'done':''}">${allDone?'✓ all done':online>0?`${online} online`:'offline'}</span>
        <span class="mcq-pill">avg ${members.length>0?(totalMcq/members.length).toFixed(1):0}/5</span>
      </div>`;
    grid.appendChild(card);
  });
}

function updateStats() {
  document.getElementById('s-teams').textContent = teams.length;
  const onlineCount = Object.values(presenceData).filter(p=>getStatus(p.lastSeen)==='online').length;
  document.getElementById('s-online').textContent = onlineCount;
  const submittedCount = Object.values(presenceData).filter(p=>p.summarySubmitted).length;
  document.getElementById('s-summaries').textContent = submittedCount;
  const allScores = Object.values(presenceData).filter(p=>p.mcqAnswered>0);
  const avgMcq = allScores.length>0?(allScores.reduce((a,p)=>a+(p.mcqScore||0),0)/allScores.length).toFixed(1):'—';
  document.getElementById('s-mcq').textContent = avgMcq;
}

window.viewSummary = async function(name) {
  const key = name.replace(/\s+/g,'_');
  const snap = await getDoc(doc(db,'presence',key));
  if(!snap.exists()) return;
  const data = snap.data();
  document.getElementById('sub-name').textContent = name;
  const team = teams.find(t=>t.members.includes(name));
  document.getElementById('sub-meta').textContent = (team?team.topic+' · ':'')+
    (data.submittedAt?new Date(data.submittedAt).toLocaleTimeString():'');
  document.getElementById('sub-text').textContent = data.summaryText || '(empty)';
  document.getElementById('sub-overlay').classList.remove('hidden');
}

window.closeSubView = function() {
  document.getElementById('sub-overlay').classList.add('hidden');
}

init();
</script>
</body>
</html>
