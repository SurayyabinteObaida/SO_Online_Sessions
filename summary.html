<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Report — SO Online</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--surface:#13151f;--surface2:#1a1d27;--border:#22263a;--accent:#4f8ef7;--accent2:#38d9a9;--warn:#f59e0b;--danger:#f87171;--text:#e8eaf0;--muted:#6b7280;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);padding:2rem 1.5rem}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto}
.page-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.tag{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px}
h1{font-size:26px;font-weight:600}
.meta{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity 0.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn:hover{opacity:0.88}
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:2rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.green{color:var(--accent2)} .blue{color:var(--accent)} .warn{color:var(--warn)} .red{color:var(--danger)}
.section-label{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2rem}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:10px 14px;text-align:left;font-weight:400;border-bottom:1px solid var(--border)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(34,38,58,0.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px}
.badge.online{background:rgba(56,217,169,0.1);color:var(--accent2);border:1px solid rgba(56,217,169,0.2)}
.badge.idle{background:rgba(245,158,11,0.1);color:var(--warn);border:1px solid rgba(245,158,11,0.2)}
.badge.offline{background:rgba(107,114,128,0.1);color:var(--muted);border:1px solid rgba(107,114,128,0.2)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.dot.online{background:var(--accent2)} .dot.idle{background:var(--warn)} .dot.offline{background:#374151}
.bar-wrap{display:flex;align-items:center;gap:7px}
.bar-track{width:50px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0}
.bar-fill{height:100%;border-radius:2px;background:var(--accent2)}
.check{color:var(--accent2)} .dash{color:var(--muted)}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:2rem}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.sum-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sum-name{font-size:14px;font-weight:500}
.sum-check{font-size:12px;color:var(--accent2)}
.sum-topic{font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:3px}
.sum-team{font-size:11px;color:var(--muted);margin-bottom:10px}
.sum-body{font-size:13px;line-height:1.7;color:#b0b8c8;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:11px;max-height:150px;overflow-y:auto}
.sum-time{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:7px}
#loading{text-align:center;padding:5rem;color:var(--muted);font-family:var(--mono);font-size:13px}
.code-input-wrap{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:2rem}
.code-input-wrap input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 14px;font-size:16px;font-family:var(--mono);color:var(--text);text-transform:uppercase;letter-spacing:0.15em;outline:none;width:180px}
.code-input-wrap input:focus{border-color:var(--accent)}
@media print {
  body{background:#fff;color:#000;padding:1rem}
  .grid-bg,.actions,.code-input-wrap{display:none!important}
  .stat{background:#f5f5f5!important;border-color:#ddd!important}
  .stat-val,.sum-name{color:#000!important}
  .muted,.stat-label,.section-label{color:#666!important}
  th{background:#eee!important;color:#444!important}
  td{color:#222!important}
  .table-wrap,.sum-card{break-inside:avoid;background:#fff!important;border-color:#ddd!important}
  h1{color:#000!important}
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
  <div id="loading">Loading report...</div>
  <div id="report" style="display:none">
    <div class="page-top">
      <div>
        <div class="tag">SO Online Sessions — Report</div>
        <h1 id="report-title">Session Report</h1>
        <div class="meta" id="report-meta">—</div>
      </div>
      <div class="actions">
        <button class="btn btn-outline" onclick="window.print()">Print / Save PDF</button>
        <button class="btn btn-primary" onclick="downloadCSV()">Download CSV</button>
        <button class="btn btn-outline" onclick="window.location='monitor.html'">← Back to monitor</button>
      </div>
    </div>
    <div class="stat-strip">
      <div class="stat"><div class="stat-label">Total students</div><div class="stat-val blue" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Were active</div><div class="stat-val green" id="s-active">—</div></div>
      <div class="stat"><div class="stat-label">Never joined</div><div class="stat-val red" id="s-absent">—</div></div>
      <div class="stat"><div class="stat-label">Summaries in</div><div class="stat-val" id="s-subs">—</div></div>
      <div class="stat"><div class="stat-label">Avg MCQ</div><div class="stat-val warn" id="s-mcq">—</div></div>
      <div class="stat"><div class="stat-label">Perfect 5/5</div><div class="stat-val green" id="s-perfect">—</div></div>
    </div>
    <div class="section-label">Individual results</div>
    <div class="table-wrap" style="margin-bottom:2rem">
      <table>
        <thead><tr><th>#</th><th>Student</th><th>Team</th><th>Topic</th><th>Status</th><th>MCQ</th><th>Summary</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="section-label" id="sum-label">Submitted summaries</div>
    <div class="sum-grid" id="sum-grid"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgYtUIOeWntYEgEcAH93PBHGjEfrrZdTg",
  authDomain: "so-online-classes.firebaseapp.com",
  projectId: "so-online-classes",
  storageBucket: "so-online-classes.firebasestorage.app",
  messagingSenderId: "763914223805",
  appId: "1:763914223805:web:24c5492eb64390331cb7d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const OFFLINE_MS = 15*60*1000, IDLE_MS = 5*60*1000;
function getStatus(lastSeen) {
  if (!lastSeen) return 'offline';
  const ago = Date.now() - lastSeen;
  return ago > OFFLINE_MS ? 'offline' : ago > IDLE_MS ? 'idle' : 'online';
}

let allStudents = [];
const code = new URLSearchParams(window.location.search).get('code');

async function load() {
  if (!code) { document.getElementById('loading').textContent = 'No session code provided. Add ?code=XXXX to the URL.'; return; }
  const sessionSnap = await getDoc(doc(db, 'sessions', code));
  if (!sessionSnap.exists()) { document.getElementById('loading').textContent = `Session "${code}" not found.`; return; }
  const session = sessionSnap.data();
  const presSnap = await getDocs(collection(db, 'sessions', code, 'presence'));
  const presence = {};
  presSnap.forEach(d => { presence[d.data().name] = d.data(); });

  allStudents = session.teams.flatMap(team =>
    team.members.map(name => {
      const p = presence[name] || {};
      return { name, team: team.name, topic: team.topic, lastSeen: p.lastSeen||null, mcqScore: p.mcqScore||0, mcqAnswered: p.mcqAnswered||0, summarySubmitted: p.summarySubmitted||false, summaryText: p.summaryText||'', submittedAt: p.submittedAt||null };
    })
  );
  allStudents.sort((a,b) => b.mcqScore - a.mcqScore || a.name.localeCompare(b.name));

  document.getElementById('report-title').textContent = `${session.subject} — ${session.className}`;
  document.getElementById('report-meta').textContent = `Code: ${code} · Instructor: ${session.instructorName} · ${new Date(session.createdAt).toLocaleString()} · ${session.durationMinutes||40} min`;

  const total = allStudents.length;
  const active = allStudents.filter(s => s.lastSeen).length;
  const absent = total - active;
  const subs = allStudents.filter(s => s.summarySubmitted).length;
  const scored = allStudents.filter(s => s.mcqAnswered > 0);
  const avg = scored.length ? (scored.reduce((a,s)=>a+s.mcqScore,0)/scored.length).toFixed(1) : '—';
  const perfect = allStudents.filter(s => s.mcqScore === 5).length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-absent').textContent = absent;
  document.getElementById('s-subs').textContent = subs;
  document.getElementById('s-mcq').textContent = avg;
  document.getElementById('s-perfect').textContent = perfect;

  const tbody = document.getElementById('tbody');
  allStudents.forEach((s, i) => {
    const status = getStatus(s.lastSeen);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-family:var(--mono)">${i+1}</td>
      <td style="font-weight:500">${s.name}</td>
      <td style="color:var(--muted)">${s.team}</td>
      <td style="color:var(--accent);font-size:11px;font-family:var(--mono);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.topic}</td>
      <td><span class="badge ${status}"><span class="dot ${status}"></span>${status}</span></td>
      <td><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${s.mcqScore/5*100}%"></div></div><span style="font-family:var(--mono);font-size:12px">${s.mcqScore}/5</span></div></td>
      <td>${s.summarySubmitted?'<span class="check">✓</span>':'<span class="dash">—</span>'}</td>`;
    tbody.appendChild(tr);
  });

  const summaries = allStudents.filter(s => s.summarySubmitted && s.summaryText);
  document.getElementById('sum-label').textContent = `Submitted summaries (${summaries.length})`;
  const grid = document.getElementById('sum-grid');
  if (!summaries.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px">No summaries submitted.</div>';
  } else {
    summaries.forEach(s => {
      const card = document.createElement('div');
      card.className = 'sum-card';
      card.innerHTML = `
        <div class="sum-head"><div class="sum-name">${s.name}</div><div class="sum-check">✓</div></div>
        <div class="sum-topic">${s.topic}</div>
        <div class="sum-team">${s.team}</div>
        <div class="sum-body">${s.summaryText}</div>
        ${s.submittedAt?`<div class="sum-time">${new Date(s.submittedAt).toLocaleTimeString()}</div>`:''}`;
      grid.appendChild(card);
    });
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('report').style.display = 'block';
}

window.downloadCSV = function() {
  const rows = [['#','Name','Team','Topic','Status','MCQ Score','MCQ Answered','Summary']];
  allStudents.forEach((s,i) => rows.push([i+1, s.name, s.team, s.topic, getStatus(s.lastSeen), s.mcqScore, s.mcqAnswered, s.summarySubmitted?'Yes':'No']));
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `${code}-report-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

load();
</script>
</body>
</html>
