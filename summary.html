<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBMS Session Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --surface: #13151f;
  --surface2: #1a1d27;
  --border: #22263a;
  --accent: #4f8ef7;
  --accent2: #38d9a9;
  --warn: #f59e0b;
  --danger: #f87171;
  --text: #e8eaf0;
  --muted: #6b7280;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:2rem 1.5rem}

.grid-bg{position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none}

.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto}

/* HEADER */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.header-left .tag{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.header-left h1{font-size:26px;font-weight:600}
.header-left .meta{font-size:13px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:opacity 0.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn:hover{opacity:0.85}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.stat-val{font-size:24px;font-weight:600}
.stat-val.green{color:var(--accent2)}
.stat-val.blue{color:var(--accent)}
.stat-val.warn{color:var(--warn)}
.stat-val.red{color:var(--danger)}

/* SECTION */
.section-title{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}

/* STUDENT TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2rem}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:10px 14px;text-align:left;font-weight:400;border-bottom:1px solid var(--border)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(34,38,58,0.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-family:var(--mono);font-size:11px}
.badge.online{background:rgba(56,217,169,0.1);color:var(--accent2);border:1px solid rgba(56,217,169,0.2)}
.badge.idle{background:rgba(245,158,11,0.1);color:var(--warn);border:1px solid rgba(245,158,11,0.2)}
.badge.offline{background:rgba(107,114,128,0.1);color:var(--muted);border:1px solid rgba(107,114,128,0.2)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot.online{background:var(--accent2)}
.dot.idle{background:var(--warn)}
.dot.offline{background:#374151}
.score-bar{display:flex;align-items:center;gap:8px}
.bar-track{width:60px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.bar-fill{height:100%;border-radius:2px;background:var(--accent2)}
.check{color:var(--accent2);font-size:13px}
.cross{color:var(--muted)}

/* SUMMARIES */
.summaries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:2rem}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.sum-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sum-name{font-size:14px;font-weight:500}
.sum-topic{font-size:11px;color:var(--accent);font-family:var(--mono)}
.sum-team{font-size:11px;color:var(--muted);margin-bottom:10px}
.sum-text{font-size:13px;line-height:1.7;color:#b0b8c8;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:160px;overflow-y:auto}
.sum-time{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:8px}

/* LOADING */
#loading{text-align:center;padding:5rem;color:var(--muted);font-family:var(--mono);font-size:13px}

/* PRINT */
@media print {
  body{background:#fff;color:#000;padding:1rem}
  .grid-bg,.header-actions,.btn{display:none!important}
  .surface,.surface2{background:#f9f9f9!important;border-color:#ddd!important}
  .stat-val,.sum-name,.team-name-cell{color:#000!important}
  .muted,.stat-label,.section-title{color:#666!important}
  .sum-text{color:#333!important;background:#f5f5f5!important;border-color:#ddd!important}
  th{background:#f0f0f0!important;color:#444!important}
  td{color:#222!important}
  .badge.online{background:#e6faf4!important;color:#0a6b4a!important}
  .badge.offline{background:#f0f0f0!important;color:#666!important}
  .table-wrap,.summary-card{break-inside:avoid}
  h1{color:#000!important}
  .tag,.meta{color:#555!important}
}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
  <div id="loading">Loading session data...</div>
  <div id="report" style="display:none">

    <div class="page-header">
      <div class="header-left">
        <div class="tag">DBMS — Mid Exam Prep</div>
        <h1>Session Report</h1>
        <div class="meta" id="report-meta">—</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="window.print()">Print / Save PDF</button>
        <button class="btn btn-primary" onclick="downloadCSV()">Download CSV</button>
      </div>
    </div>

    <div class="stat-strip">
      <div class="stat-card"><div class="stat-label">Total students</div><div class="stat-val blue" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Were online</div><div class="stat-val green" id="s-online">—</div></div>
      <div class="stat-card"><div class="stat-label">Never connected</div><div class="stat-val red" id="s-offline">—</div></div>
      <div class="stat-card"><div class="stat-label">Summaries submitted</div><div class="stat-val" id="s-summaries">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg MCQ score</div><div class="stat-val warn" id="s-mcq">—</div></div>
      <div class="stat-card"><div class="stat-label">Full score (5/5)</div><div class="stat-val green" id="s-perfect">—</div></div>
    </div>

    <!-- STUDENT TABLE -->
    <div class="section-title" style="margin-bottom:12px">Individual student results</div>
    <div class="table-wrap" style="margin-bottom:2rem">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Student</th>
            <th>Team</th>
            <th>Topic</th>
            <th>Status</th>
            <th>MCQ score</th>
            <th>Summary</th>
          </tr>
        </thead>
        <tbody id="student-tbody"></tbody>
      </table>
    </div>

    <!-- SUMMARIES -->
    <div class="section-title" id="sum-section-label">Submitted summaries</div>
    <div class="summaries-grid" id="summaries-grid"></div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgYtUIOeWntYEgEcAH93PBHGjEfrrZdTg",
  authDomain: "so-online-classes.firebaseapp.com",
  projectId: "so-online-classes",
  storageBucket: "so-online-classes.firebasestorage.app",
  messagingSenderId: "763914223805",
  appId: "1:763914223805:web:24c5492eb64390331cb7d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const OFFLINE_MS = 15 * 60 * 1000;
const IDLE_MS = 5 * 60 * 1000;

function getStatus(lastSeen) {
  if (!lastSeen) return 'offline';
  const ago = Date.now() - lastSeen;
  if (ago > OFFLINE_MS) return 'offline';
  if (ago > IDLE_MS) return 'idle';
  return 'online';
}

let allStudents = [];

async function load() {
  const sessionSnap = await getDoc(doc(db, 'session', 'config'));
  if (!sessionSnap.exists()) {
    document.getElementById('loading').textContent = 'No session data found.';
    return;
  }
  const session = sessionSnap.data();
  const teams = session.teams || [];

  const presSnap = await getDocs(collection(db, 'presence'));
  const presence = {};
  presSnap.forEach(d => { presence[d.data().name] = d.data(); });

  // Build student list
  allStudents = [];
  teams.forEach(team => {
    team.members.forEach(name => {
      const p = presence[name] || {};
      allStudents.push({
        name,
        team: team.name,
        topic: team.topic,
        lastSeen: p.lastSeen || null,
        mcqScore: p.mcqScore || 0,
        mcqAnswered: p.mcqAnswered || 0,
        summarySubmitted: p.summarySubmitted || false,
        summaryText: p.summaryText || '',
        submittedAt: p.submittedAt || null
      });
    });
  });

  allStudents.sort((a,b) => (b.mcqScore - a.mcqScore) || a.name.localeCompare(b.name));

  // Stats
  const total = allStudents.length;
  const everOnline = allStudents.filter(s => s.lastSeen).length;
  const neverOnline = total - everOnline;
  const summitted = allStudents.filter(s => s.summarySubmitted).length;
  const scores = allStudents.filter(s => s.mcqAnswered > 0);
  const avgMcq = scores.length > 0 ? (scores.reduce((a,s)=>a+s.mcqScore,0)/scores.length).toFixed(1) : '—';
  const perfect = allStudents.filter(s => s.mcqScore === 5).length;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-online').textContent = everOnline;
  document.getElementById('s-offline').textContent = neverOnline;
  document.getElementById('s-summaries').textContent = summitted;
  document.getElementById('s-mcq').textContent = avgMcq;
  document.getElementById('s-perfect').textContent = perfect;

  const genTime = session.startTime ? new Date(session.startTime).toLocaleString() : 'Unknown';
  document.getElementById('report-meta').textContent = `Generated ${new Date().toLocaleString()} · Session started ${genTime}`;

  // Table
  const tbody = document.getElementById('student-tbody');
  allStudents.forEach((s, i) => {
    const status = getStatus(s.lastSeen);
    const pct = (s.mcqScore / 5) * 100;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-family:var(--mono)">${i+1}</td>
      <td style="font-weight:500">${s.name}</td>
      <td style="color:var(--muted)">${s.team}</td>
      <td style="color:var(--accent);font-size:12px;font-family:var(--mono);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.topic}</td>
      <td><span class="badge ${status}"><span class="dot ${status}"></span>${status}</span></td>
      <td>
        <div class="score-bar">
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span style="font-family:var(--mono);font-size:12px">${s.mcqScore}/5</span>
        </div>
      </td>
      <td>${s.summarySubmitted ? '<span class="check">✓ submitted</span>' : '<span class="cross">—</span>'}</td>`;
    tbody.appendChild(tr);
  });

  // Summaries
  const summaries = allStudents.filter(s => s.summarySubmitted && s.summaryText);
  document.getElementById('sum-section-label').textContent = `Submitted summaries (${summaries.length})`;
  const grid = document.getElementById('summaries-grid');
  if (summaries.length === 0) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:1rem 0">No summaries submitted yet.</div>';
  } else {
    summaries.forEach(s => {
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="sum-header">
          <div class="sum-name">${s.name}</div>
          <div class="badge online">✓</div>
        </div>
        <div class="sum-topic">${s.topic}</div>
        <div class="sum-team">${s.team}</div>
        <div class="sum-text">${s.summaryText}</div>
        ${s.submittedAt ? `<div class="sum-time">Submitted at ${new Date(s.submittedAt).toLocaleTimeString()}</div>` : ''}`;
      grid.appendChild(card);
    });
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('report').style.display = 'block';
}

window.downloadCSV = function() {
  const rows = [['#','Name','Team','Topic','Status','MCQ Score','MCQ Answered','Summary Submitted']];
  allStudents.forEach((s,i) => {
    rows.push([i+1, s.name, s.team, s.topic, getStatus(s.lastSeen), s.mcqScore, s.mcqAnswered, s.summarySubmitted?'Yes':'No']);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dbms-session-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

load();
</script>
</body>
</html>
